name: World Cup Live Scores Auto-Sync

on:
  schedule:
    # Runs automatically every 5 minutes, 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows you to click a button in GitHub to manually force an update anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: |
          npm install
          npm install firebase-admin

      - name: Fetch and Push Scores to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node cron-update-scores.js